services:
  app:
    build: .
    container_name: misweb-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/mis
    volumes:
      - misweb_uploads:/app/uploads
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: misweb-mongo
    restart: unless-stopped
    volumes:
      - misweb_mongo_data:/data/db
    # Disaridan erisim gerekmiyorsa "ports" acmayin - sadece app servisi
    # ayni docker aginda mongo:27017 uzerinden erisir.

volumes:
  misweb_mongo_data:
  misweb_uploads:
