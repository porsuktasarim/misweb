<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3T Detay - Mera İzleme Sistemi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="/assets/css/layout.css?v=12" rel="stylesheet" />
  <style>
    .evrak-satiri { display: flex; align-items: center; gap: .75rem; padding: .6rem .2rem; border-bottom: 1px solid #eef2ef; }
    .evrak-satiri:last-child { border-bottom: none; }
    .evrak-kodu { font-size: 11px; font-weight: 700; color: #0F6E56; background: rgba(15,110,86,.08); border-radius: 5px; padding: .1rem .45rem; white-space: nowrap; }
    .evrak-tamamlandi .evrak-ad { text-decoration: line-through; color: #8a978f; }
    .ek4ab-secili { border: 1px solid #0F6E56; background: rgba(15,110,86,.06); border-radius: 8px; padding: .75rem 1rem; }
    .ek4ab-aday { border: 1px solid #e2e8e4; border-radius: 8px; padding: .6rem .8rem; margin-bottom: .4rem; display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>

  <div class="mis-kabuk" id="mis-kabuk">
    <div class="mis-marka" id="mis-marka"></div>
    <div class="mis-ustcubuk" id="mis-ustcubuk"></div>
    <nav class="mis-anamenu" id="mis-anamenu"></nav>

    <div class="mis-icerik">
      <div class="mis-icerik-birincil">
        <div class="mis-panel">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <h2 class="mb-0" id="bBaslik">Yükleniyor...</h2>
              <div class="small text-muted">Tespit ve Tahdit Evrak Kontrol Listesi</div>
            </div>
            <div class="d-flex gap-2">
              <a href="/uc-t/" class="btn btn-sm btn-outline-secondary">Listeye Dön</a>
              <button class="btn btn-sm btn-outline-danger" onclick="silKayit()">Sil</button>
            </div>
          </div>

          <div id="evrakListesi"></div>
        </div>
      </div>

      <div class="mis-icerik-ikincil">
        <div class="mis-panel">
          <h2>Ek-4ab Kaynağı</h2>
          <p class="text-muted small">
            Tahsis aşamasında ihtiyaç duyulacak aile/çiftçi ailesi,
            geçim kaynağı ve hayvan varlığı (BBHB) bilgileri, bu köy
            için hazırlanmış bir Ek-4ab kaydından alınacak.
          </p>
          <div id="ek4abAlani"></div>
        </div>
      </div>
    </div>

    <footer class="mis-footer" id="mis-footer"></footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/mis-menu.js?v=16"></script>
  <script src="/assets/js/shell.js?v=12"></script>
  <script>
    misKabuguBaslat('uc-t', '3T<span class="ayrac">/</span>Detay');

    const API = '/api/uc-t';
    const id = new URLSearchParams(location.search).get('id');
    let kayit = null;

    function tarihFormatla(iso) {
      if (!iso) return '-';
      return new Date(iso).toLocaleDateString('tr-TR');
    }

    function renderEvraklar() {
      const alan = document.getElementById('evrakListesi');
      alan.innerHTML = kayit.tespitTahditEvraklari.map((e, i) => `
        <div class="evrak-satiri ${e.tamamlandiMi ? 'evrak-tamamlandi' : ''}">
          <input type="checkbox" class="form-check-input flex-shrink-0" ${e.tamamlandiMi ? 'checked' : ''} onchange="evrakDegistir(${i}, this.checked)" />
          <span class="evrak-kodu flex-shrink-0">${e.ekKodu}</span>
          <span class="evrak-ad flex-grow-1">${e.ad}</span>
          ${e.tamamlandiMi ? `<span class="text-muted small flex-shrink-0">${tarihFormatla(e.tamamlanmaTarihi)}</span>` : ''}
        </div>`).join('');
    }

    window.evrakDegistir = async (index, tamamlandiMi) => {
      const res = await fetch(`${API}/${id}/evrak`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ evrakIndex: index, tamamlandiMi }),
      });
      const json = await res.json();
      if (json.success) { kayit = json.data; renderEvraklar(); }
    };

    async function renderEk4ab() {
      const alan = document.getElementById('ek4abAlani');

      if (kayit.ek4abKaydiId) {
        const e = kayit.ek4abKaydiId;
        alan.innerHTML = `
          <div class="ek4ab-secili mb-2">
            <div class="small text-muted">Seçili kaynak</div>
            <strong>${e.il} / ${e.ilce} / ${e.koyMahalle}</strong>
            <div class="small text-muted mt-1">${e.uretimYili ? e.uretimYili + ' üretim yılı · ' : ''}Toplam BBHB: ${(e.genelToplamBBHB || 0).toFixed(2)}</div>
            <a href="/ek4ab/detay.html?id=${e._id}" class="small" target="_blank">Ek-4ab kaydını görüntüle →</a>
          </div>
          <button class="btn btn-sm btn-outline-secondary" onclick="ek4abSecimiKaldir()">Değiştir / Kaldır</button>
        `;
        return;
      }

      alan.innerHTML = '<div class="text-muted small">Uygun Ek-4ab kayıtları aranıyor...</div>';
      const res = await fetch(`${API}/ek4ab-adaylari?il=${encodeURIComponent(kayit.il)}&ilce=${encodeURIComponent(kayit.ilce)}&koyMahalle=${encodeURIComponent(kayit.koyMahalle)}`);
      const json = await res.json();
      if (!json.success || json.data.length === 0) {
        alan.innerHTML = `
          <div class="text-muted small mb-2">Bu köy için hazır Ek-4ab kaydı bulunamadı.</div>
          <a href="/ek4ab/" class="btn btn-sm btn-outline-primary" target="_blank">Ek-4ab modülüne git</a>
        `;
        return;
      }
      alan.innerHTML = json.data.map((e) => `
        <div class="ek4ab-aday">
          <div class="small">
            <strong>${e.uretimYili || '-'} üretim yılı</strong>
            <div class="text-muted">Toplam BBHB: ${(e.genelToplamBBHB || 0).toFixed(2)} · ${tarihFormatla(e.createdAt)}</div>
          </div>
          <button class="btn btn-sm btn-primary flex-shrink-0" onclick="ek4abSec('${e._id}')">Bunu Seç</button>
        </div>`).join('');
    }

    window.ek4abSec = async (ek4abKaydiId) => {
      const res = await fetch(`${API}/${id}/ek4ab-sec`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ek4abKaydiId }),
      });
      const json = await res.json();
      if (json.success) { await yukle(); }
    };

    window.ek4abSecimiKaldir = async () => {
      const res = await fetch(`${API}/${id}/ek4ab-sec`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ek4abKaydiId: null }),
      });
      const json = await res.json();
      if (json.success) { await yukle(); }
    };

    window.silKayit = async () => {
      if (!confirm('Bu 3T kaydını silmek istediğine emin misin?')) return;
      const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
      const json = await res.json();
      if (json.success) window.location.href = '/uc-t/';
      else alert(json.message);
    };

    async function yukle() {
      const res = await fetch(`${API}/${id}`);
      const json = await res.json();
      if (!json.success) { document.getElementById('bBaslik').textContent = 'Bulunamadı'; return; }
      kayit = json.data;
      document.getElementById('bBaslik').textContent = `${kayit.il} / ${kayit.ilce} / ${kayit.koyMahalle}`;
      document.title = `${kayit.koyMahalle} - 3T - MİS`;
      renderEvraklar();
      await renderEk4ab();
    }
    yukle();
  </script>
</body>
</html>
