<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3T Detay - Mera İzleme Sistemi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="/assets/css/layout.css?v=12" rel="stylesheet" />
  <style>
    /* ---- Sağ sütun: süreç ağacı ---- */
    .ana-adim-blok { margin-bottom: 1rem; }
    .ana-adim-baslik { display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 700; color: #4a6358; text-transform: uppercase; letter-spacing: .02em; padding: .3rem .1rem; }
    .ana-adim-ilerleme { font-size: 11px; font-weight: 500; color: #8a978f; }
    .alt-adim-satiri { display: flex; align-items: center; gap: .6rem; padding: .55rem .6rem; border-radius: 8px; cursor: pointer; border: 1px solid transparent; }
    .alt-adim-satiri:hover { background: #f8faf8; }
    .alt-adim-satiri.secili { border-color: #0F6E56; background: rgba(15,110,86,.06); }
    .alt-adim-durum { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #cdd9d2; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .alt-adim-durum.tamam { background: #0F6E56; border-color: #0F6E56; color: #fff; }
    .alt-adim-metin { flex-grow: 1; font-size: 13px; line-height: 1.3; }
    .alt-adim-ek-kodu { font-size: 10px; color: #8a978f; }
    .alt-adim-cikti-rozeti { font-size: 10px; font-weight: 600; color: #0F6E56; background: rgba(15,110,86,.10); border-radius: 5px; padding: .1rem .4rem; white-space: nowrap; }

    /* ---- Sol sütun: veri giriş paneli ---- */
    .veri-paneli-bos { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; color: #8a978f; text-align: center; }
    .veri-paneli-baslik { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #e2e8e4; }

    .ek4ab-secili { border: 1px solid #0F6E56; background: rgba(15,110,86,.06); border-radius: 8px; padding: .65rem .85rem; font-size: 13px; }
    .ek4ab-aday { border: 1px solid #e2e8e4; border-radius: 8px; padding: .5rem .7rem; margin-bottom: .35rem; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  </style>
</head>
<body>

  <div class="mis-kabuk" id="mis-kabuk">
    <div class="mis-marka" id="mis-marka"></div>
    <div class="mis-ustcubuk" id="mis-ustcubuk"></div>
    <nav class="mis-anamenu" id="mis-anamenu"></nav>

    <div class="mis-icerik">

      <!-- SOL: veri giriş paneli -->
      <div class="mis-icerik-birincil">
        <div class="mis-panel">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <div>
              <h2 class="mb-0" id="bBaslik">Yükleniyor...</h2>
              <div class="small text-muted">3T Süreci</div>
            </div>
            <div class="d-flex gap-2">
              <a href="/uc-t/" class="btn btn-sm btn-outline-secondary">Listeye Dön</a>
              <button class="btn btn-sm btn-outline-danger" onclick="silKayit()">Sil</button>
            </div>
          </div>

          <div id="veriPaneli">
            <div class="veri-paneli-bos">
              <i class="bi bi-arrow-right-circle" style="font-size:2rem;"></i>
              <p class="mt-2 mb-0">Sağdaki süreçten bir adım seç.</p>
            </div>
          </div>
        </div>
      </div>

      <!-- SAĞ: süreç ağacı -->
      <div class="mis-icerik-ikincil">
        <div class="mis-panel">
          <h2>Ek-4ab Kaynağı</h2>
          <div id="ek4abAlani" class="mb-3"></div>

          <h2>Süreç</h2>
          <div id="surecAgaci"></div>
        </div>
      </div>

    </div>

    <footer class="mis-footer" id="mis-footer"></footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/mis-menu.js?v=16"></script>
  <script src="/assets/js/shell.js?v=12"></script>
  <script>
    misKabuguBaslat('uc-t', '3T<span class="ayrac">/</span>Detay');

    const API = '/api/uc-t';
    const id = new URLSearchParams(location.search).get('id');
    let kayit = null;
    let seciliAna = null;
    let seciliAlt = null;

    function tarihFormatla(iso) {
      if (!iso) return '-';
      return new Date(iso).toLocaleDateString('tr-TR');
    }
    function guvenliMetin(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ================= SAĞ: SÜREÇ AĞACI =================
    function renderSurec() {
      const alan = document.getElementById('surecAgaci');
      alan.innerHTML = kayit.surec.map((ana, ai) => {
        const tamam = ana.altAdimlar.filter((a) => a.tamamlandiMi).length;
        return `
          <div class="ana-adim-blok">
            <div class="ana-adim-baslik">
              <span>${guvenliMetin(ana.ad)}</span>
              <span class="ana-adim-ilerleme">${tamam}/${ana.altAdimlar.length}</span>
            </div>
            ${ana.altAdimlar.map((alt, alti) => `
              <div class="alt-adim-satiri ${seciliAna === ai && seciliAlt === alti ? 'secili' : ''}" onclick="adimSec(${ai}, ${alti})">
                <div class="alt-adim-durum ${alt.tamamlandiMi ? 'tamam' : ''}">${alt.tamamlandiMi ? '<i class="bi bi-check"></i>' : ''}</div>
                <div class="alt-adim-metin">
                  ${guvenliMetin(alt.ad)}
                  <div class="alt-adim-ek-kodu">${guvenliMetin(alt.ekKodu || '')}</div>
                </div>
                ${alt.tamamlandiMi && alt.ciktiVarMi ? `<span class="alt-adim-cikti-rozeti">${guvenliMetin(alt.ekKodu)}</span>` : ''}
              </div>
            `).join('')}
          </div>`;
      }).join('');
    }

    // ================= SOL: VERİ GİRİŞ PANELİ =================
    window.adimSec = (anaAdimIndex, altAdimIndex) => {
      seciliAna = anaAdimIndex;
      seciliAlt = altAdimIndex;
      renderSurec();
      renderVeriPaneli();
    };

    function renderVeriPaneli() {
      const panel = document.getElementById('veriPaneli');
      if (seciliAna === null) {
        panel.innerHTML = `<div class="veri-paneli-bos"><i class="bi bi-arrow-right-circle" style="font-size:2rem;"></i><p class="mt-2 mb-0">Sağdaki süreçten bir adım seç.</p></div>`;
        return;
      }
      const ana = kayit.surec[seciliAna];
      const alt = ana.altAdimlar[seciliAlt];

      panel.innerHTML = `
        <div class="veri-paneli-baslik">
          <div>
            <div class="small text-muted">${guvenliMetin(ana.ad)}</div>
            <h4 class="mb-0">${guvenliMetin(alt.ad)}</h4>
            ${alt.ekKodu ? `<span class="badge bg-secondary mt-1">${guvenliMetin(alt.ekKodu)}</span>` : ''}
          </div>
          <span class="badge ${alt.tamamlandiMi ? 'bg-success' : 'bg-warning text-dark'}">${alt.tamamlandiMi ? 'Tamamlandı' : 'Bekliyor'}</span>
        </div>
        <div id="veriPaneliGovde"></div>
      `;

      if (alt.tip === 'ek4a') return renderEk4aPaneli(alt);
      if (alt.tip === 'ek4b') return renderEk4bPaneli(alt);
      if (alt.tip === 'birlestir') return renderBirlestirPaneli();
      return renderManuelPaneli(alt);
    }

    // ---- MANUEL (varsayılan) panel ----
    function renderManuelPaneli(alt) {
      document.getElementById('veriPaneliGovde').innerHTML = `
        <p class="text-muted small">
          Bu adım için veri girişi ekranı ileride buraya eklenecek.
          Şimdilik adımı manuel olarak tamamlandı işaretleyip not
          ekleyebilirsin - istediğin zaman güncelleyebilirsin.
        </p>
        <div class="form-check form-switch mb-3">
          <input class="form-check-input" type="checkbox" id="tamamlandiSwitch" ${alt.tamamlandiMi ? 'checked' : ''} style="width:2.5em;height:1.3em;">
          <label class="form-check-label" for="tamamlandiSwitch">Bu adım tamamlandı</label>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Not (opsiyonel)</label>
          <textarea class="form-control" id="adimNotu" rows="3">${guvenliMetin(alt.not || '')}</textarea>
        </div>
        ${alt.tamamlandiMi ? `<div class="small text-muted mb-3"><i class="bi bi-clock-history me-1"></i>Tamamlanma tarihi: ${tarihFormatla(alt.tamamlanmaTarihi)}</div>` : ''}
        <button class="btn btn-primary btn-sm" onclick="adimKaydet()">Kaydet</button>
        <div id="adimKaydetSonuc" class="mt-2"></div>
      `;
    }

    window.adimKaydet = async () => {
      const tamamlandiMi = document.getElementById('tamamlandiSwitch').checked;
      const not = document.getElementById('adimNotu').value;
      const sonucAlan = document.getElementById('adimKaydetSonuc');
      sonucAlan.innerHTML = '<span class="text-muted small">Kaydediliyor...</span>';

      const res = await fetch(`${API}/${id}/adim`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ anaAdimIndex: seciliAna, altAdimIndex: seciliAlt, tamamlandiMi, not }),
      });
      const json = await res.json();
      if (!json.success) { sonucAlan.innerHTML = `<span class="text-danger small">${json.message}</span>`; return; }

      kayit = json.data;
      renderSurec();
      renderVeriPaneli();
      sonucAlan.innerHTML = '<span class="text-success small"><i class="bi bi-check-circle me-1"></i>Kaydedildi.</span>';
    };

    // ---- EK-4/A panel: BBHB + ÇKS seç, birleştir ----
    async function renderEk4aPaneli(alt) {
      const govde = document.getElementById('veriPaneliGovde');
      govde.innerHTML = `
        <p class="text-muted small">Bu köy için BBHB (hayvan varlığı) ve ÇKS (ekiliş/geçim kaynağı) kayıtlarını seç - birleştirilip çiftçi bazlı liste üretilecek.</p>
        <div class="row g-2 mb-2">
          <div class="col-md-6">
            <label class="form-label small fw-semibold">BBHB Kaydı *</label>
            <select id="ek4aBbhbSelect" class="form-select form-select-sm"><option value="">Yükleniyor...</option></select>
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-semibold">ÇKS Kaydı (opsiyonel)</label>
            <select id="ek4aCksSelect" class="form-select form-select-sm"><option value="">Yükleniyor...</option></select>
          </div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="ek4aVeriCekVeKaydet()">Veri Çek ve Kaydet</button>
        <div id="ek4aSonuc" class="mt-2"></div>
        <div id="ek4aOnizleme" class="mt-3"></div>
      `;

      const [bbhbJson, cksJson] = await Promise.all([
        fetch(`${API}/bbhb-adaylari?il=${encodeURIComponent(kayit.il)}&ilce=${encodeURIComponent(kayit.ilce)}&koyMahalle=${encodeURIComponent(kayit.koyMahalle)}`).then((r) => r.json()),
        fetch(`${API}/cks-adaylari?il=${encodeURIComponent(kayit.il)}&ilce=${encodeURIComponent(kayit.ilce)}&koyMahalle=${encodeURIComponent(kayit.koyMahalle)}`).then((r) => r.json()),
      ]);

      const bbhbSelect = document.getElementById('ek4aBbhbSelect');
      bbhbSelect.innerHTML = (bbhbJson.success && bbhbJson.data.length)
        ? bbhbJson.data.map((b) => `<option value="${b._id}" ${alt.kaynakBbhbSonucId === b._id ? 'selected' : ''}>${tarihFormatla(b.hesaplamaTarihi)} · Toplam BBHB: ${b.bolumToplamBBHB.toFixed(2)} · ${b.isletmeciSayisi} işletmeci</option>`).join('')
        : '<option value="">Kayıt bulunamadı</option>';

      const cksSelect = document.getElementById('ek4aCksSelect');
      cksSelect.innerHTML = '<option value="">— Seçilmedi —</option>' + ((cksJson.success && cksJson.data.length)
        ? cksJson.data.map((c) => `<option value="${c._id}" ${alt.kaynakCksSonucId === c._id ? 'selected' : ''}>${c.uretimYili || '-'} üretim yılı · ${c.ciftciler.length} çiftçi</option>`).join('')
        : '');

      if (alt.veri) renderEk4aOnizleme(alt.veri);
    }

    function renderEk4aOnizleme(veri) {
      document.getElementById('ek4aOnizleme').innerHTML = `
        <div class="small text-muted mb-1">${veri.ciftciler.length} çiftçi · ${veri.eslesmeyenSayisi} ÇKS eşleşmesi yok · Toplam BBHB: ${veri.bolumToplamBBHB.toFixed(2)}</div>
        <table class="table table-sm">
          <thead><tr><th>İşletmeci</th><th>Hayvan (BBHB)</th><th>Yem Bitkisi</th><th>Sebze</th><th>Hububat</th></tr></thead>
          <tbody>${veri.ciftciler.map((c) => `<tr><td>${guvenliMetin(c.isletmeciAdi)}</td><td>${c.toplamHayvanVarligi}</td><td>${c.yemBitkisi ?? '-'}</td><td>${c.sebzeBag ?? '-'}</td><td>${c.hububat ?? '-'}</td></tr>`).join('')}</tbody>
        </table>
      `;
    }

    window.ek4aVeriCekVeKaydet = async () => {
      const bbhbSonucId = document.getElementById('ek4aBbhbSelect').value;
      const cksSonucId = document.getElementById('ek4aCksSelect').value;
      const sonucAlan = document.getElementById('ek4aSonuc');
      if (!bbhbSonucId) { sonucAlan.innerHTML = '<span class="text-danger small">BBHB kaydı seçilmelidir.</span>'; return; }
      sonucAlan.innerHTML = '<span class="text-muted small">Hesaplanıyor...</span>';

      const res = await fetch(`${API}/${id}/ek4a-veri-cek`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ anaAdimIndex: seciliAna, altAdimIndex: seciliAlt, bbhbSonucId, cksSonucId: cksSonucId || null }),
      });
      const json = await res.json();
      if (!json.success) { sonucAlan.innerHTML = `<span class="text-danger small">${json.message}</span>`; return; }

      kayit = json.data;
      renderSurec();
      sonucAlan.innerHTML = '<span class="text-success small"><i class="bi bi-check-circle me-1"></i>Kaydedildi.</span>';
      renderEk4aOnizleme(kayit.surec[seciliAna].altAdimlar[seciliAlt].veri);
    };

    // ---- EK-4/B panel: BBHB seç, kategori toplamlarını üret ----
    async function renderEk4bPaneli(alt) {
      const govde = document.getElementById('veriPaneliGovde');
      govde.innerHTML = `
        <p class="text-muted small">Bu köy için BBHB kaydını seç - köy düzeyinde Kültür/Kültür Melezi/Yerli × İnek/Dana-Düve ve Küçükbaş toplamları üretilecek.</p>
        <div class="mb-2">
          <label class="form-label small fw-semibold">BBHB Kaydı *</label>
          <select id="ek4bBbhbSelect" class="form-select form-select-sm"><option value="">Yükleniyor...</option></select>
        </div>
        <button class="btn btn-primary btn-sm" onclick="ek4bVeriCekVeKaydet()">Veri Çek ve Kaydet</button>
        <div id="ek4bSonuc" class="mt-2"></div>
        <div id="ek4bOnizleme" class="mt-3"></div>
      `;

      const bbhbJson = await fetch(`${API}/bbhb-adaylari?il=${encodeURIComponent(kayit.il)}&ilce=${encodeURIComponent(kayit.ilce)}&koyMahalle=${encodeURIComponent(kayit.koyMahalle)}`).then((r) => r.json());
      const bbhbSelect = document.getElementById('ek4bBbhbSelect');
      bbhbSelect.innerHTML = (bbhbJson.success && bbhbJson.data.length)
        ? bbhbJson.data.map((b) => `<option value="${b._id}" ${alt.kaynakBbhbSonucId === b._id ? 'selected' : ''}>${tarihFormatla(b.hesaplamaTarihi)} · Toplam BBHB: ${b.bolumToplamBBHB.toFixed(2)}</option>`).join('')
        : '<option value="">Kayıt bulunamadı</option>';

      if (alt.veri) renderEk4bOnizleme(alt.veri);
    }

    function renderEk4bOnizleme(veri) {
      const t = veri.kategoriToplamlari;
      document.getElementById('ek4bOnizleme').innerHTML = `
        <table class="table table-sm">
          <thead><tr><th></th><th>İnek</th><th>Dana-Düve</th></tr></thead>
          <tbody>
            <tr><th>Kültür</th><td>${t.kulturIrki.inek}</td><td>${t.kulturIrki.duveDana}</td></tr>
            <tr><th>Kültür Melezi</th><td>${t.kulturMelezi.inek}</td><td>${t.kulturMelezi.duveDana}</td></tr>
            <tr><th>Yerli</th><td>${t.yerliIrk.inek}</td><td>${t.yerliIrk.duveDana}</td></tr>
          </tbody>
        </table>
        <table class="table table-sm">
          <thead><tr><th>Küçükbaş</th><th>Koyun</th><th>Keçi</th></tr></thead>
          <tbody><tr><td></td><td>${t.kucukbas.koyun}</td><td>${t.kucukbas.kec}</td></tr></tbody>
        </table>
        <div class="small text-muted">Toplam BBHB: ${veri.bbhbToplam.toFixed(2)}</div>
      `;
    }

    window.ek4bVeriCekVeKaydet = async () => {
      const bbhbSonucId = document.getElementById('ek4bBbhbSelect').value;
      const sonucAlan = document.getElementById('ek4bSonuc');
      if (!bbhbSonucId) { sonucAlan.innerHTML = '<span class="text-danger small">BBHB kaydı seçilmelidir.</span>'; return; }
      sonucAlan.innerHTML = '<span class="text-muted small">Hesaplanıyor...</span>';

      const res = await fetch(`${API}/${id}/ek4b-veri-cek`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ anaAdimIndex: seciliAna, altAdimIndex: seciliAlt, bbhbSonucId }),
      });
      const json = await res.json();
      if (!json.success) { sonucAlan.innerHTML = `<span class="text-danger small">${json.message}</span>`; return; }

      kayit = json.data;
      renderSurec();
      sonucAlan.innerHTML = '<span class="text-success small"><i class="bi bi-check-circle me-1"></i>Kaydedildi.</span>';
      renderEk4bOnizleme(kayit.surec[seciliAna].altAdimlar[seciliAlt].veri);
    };

    // ---- BİRLEŞTİRME panel: 4a+4b özet, devam et ----
    function renderBirlestirPaneli() {
      const altAdimlar = kayit.surec[seciliAna].altAdimlar;
      const ek4a = altAdimlar.find((a) => a.tip === 'ek4a');
      const ek4b = altAdimlar.find((a) => a.tip === 'ek4b');
      const govde = document.getElementById('veriPaneliGovde');

      const ek4aHazir = ek4a && ek4a.tamamlandiMi;
      const ek4bHazir = ek4b && ek4b.tamamlandiMi;

      govde.innerHTML = `
        <p class="text-muted small">Ek-4/a ve Ek-4/b'nin ikisi de tamamlandığında bu adım onaylanıp bir sonraki adıma (Kroki ve Harita) geçilebilir.</p>
        <div class="d-flex gap-2 mb-3">
          <span class="badge ${ek4aHazir ? 'bg-success' : 'bg-secondary'}">${ek4aHazir ? '✓' : '…'} Ek-4/a</span>
          <span class="badge ${ek4bHazir ? 'bg-success' : 'bg-secondary'}">${ek4bHazir ? '✓' : '…'} Ek-4/b</span>
        </div>
        ${(ek4aHazir && ek4bHazir) ? `
          <button class="btn btn-primary btn-sm" onclick="birlestirVeDevamEt()">Birleştir ve Devam Et</button>
        ` : `<div class="alert alert-warning small py-2">Önce Ek-4/a ve Ek-4/b tamamlanmalı.</div>`}
        <div id="birlestirSonuc" class="mt-2"></div>
      `;
    }

    window.birlestirVeDevamEt = async () => {
      const sonucAlan = document.getElementById('birlestirSonuc');
      sonucAlan.innerHTML = '<span class="text-muted small">İşleniyor...</span>';
      const res = await fetch(`${API}/${id}/birlestir`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ anaAdimIndex: seciliAna, altAdimIndex: seciliAlt }),
      });
      const json = await res.json();
      if (!json.success) { sonucAlan.innerHTML = `<span class="text-danger small">${json.message}</span>`; return; }
      kayit = json.data;
      renderSurec();
      sonucAlan.innerHTML = '<span class="text-success small"><i class="bi bi-check-circle me-1"></i>Devam edilebilir.</span>';
    };

    // ================= EK-4AB KAYNAĞI =================
    async function renderEk4ab() {
      const alan = document.getElementById('ek4abAlani');

      if (kayit.ek4abKaydiId) {
        const e = kayit.ek4abKaydiId;
        alan.innerHTML = `
          <div class="ek4ab-secili mb-2">
            <strong>${guvenliMetin(e.uretimYili || '-')} üretim yılı</strong>
            <div class="text-muted">Toplam BBHB: ${(e.genelToplamBBHB || 0).toFixed(2)}</div>
            <a href="/ek4ab/detay.html?id=${e._id}" class="small" target="_blank">Görüntüle →</a>
          </div>
          <button class="btn btn-sm btn-outline-secondary" onclick="ek4abSecimiKaldir()">Değiştir</button>
        `;
        return;
      }

      alan.innerHTML = '<div class="text-muted small">Aranıyor...</div>';
      const res = await fetch(`${API}/ek4ab-adaylari?il=${encodeURIComponent(kayit.il)}&ilce=${encodeURIComponent(kayit.ilce)}&koyMahalle=${encodeURIComponent(kayit.koyMahalle)}`);
      const json = await res.json();
      if (!json.success || json.data.length === 0) {
        alan.innerHTML = `<div class="text-muted small mb-2">Hazır Ek-4ab kaydı yok.</div><a href="/ek4ab/" class="btn btn-sm btn-outline-primary" target="_blank">Ek-4ab'ye git</a>`;
        return;
      }
      alan.innerHTML = json.data.map((e) => `
        <div class="ek4ab-aday">
          <div><strong>${e.uretimYili || '-'}</strong><div class="text-muted">BBHB: ${(e.genelToplamBBHB || 0).toFixed(2)}</div></div>
          <button class="btn btn-sm btn-primary" onclick="ek4abSec('${e._id}')">Seç</button>
        </div>`).join('');
    }

    window.ek4abSec = async (ek4abKaydiId) => {
      const res = await fetch(`${API}/${id}/ek4ab-sec`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ek4abKaydiId }),
      });
      const json = await res.json();
      if (json.success) await yukle();
    };
    window.ek4abSecimiKaldir = async () => {
      const res = await fetch(`${API}/${id}/ek4ab-sec`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ek4abKaydiId: null }),
      });
      const json = await res.json();
      if (json.success) await yukle();
    };

    window.silKayit = async () => {
      if (!confirm('Bu 3T kaydını silmek istediğine emin misin?')) return;
      const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
      const json = await res.json();
      if (json.success) window.location.href = '/uc-t/';
      else alert(json.message);
    };

    async function yukle() {
      const res = await fetch(`${API}/${id}`);
      const json = await res.json();
      if (!json.success) { document.getElementById('bBaslik').textContent = 'Bulunamadı'; return; }
      kayit = json.data;
      document.getElementById('bBaslik').textContent = `${kayit.il} / ${kayit.ilce} / ${kayit.koyMahalle}`;
      document.title = `${kayit.koyMahalle} - 3T - MİS`;
      renderSurec();
      renderVeriPaneli();
      await renderEk4ab();
    }
    yukle();
  </script>
</body>
</html>
