<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>BBHB Hesaplama - Mera İzleme Sistemi</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">
  <div class="container py-4">
    <h1 class="h3 mb-4">BBHB Hesaplama</h1>

    <ul class="nav nav-tabs mb-3">
      <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#manuel-tab">
          Manuel Giriş
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#turkvet-tab">
          Türkvet Dosyası
        </button>
      </li>
    </ul>

    <div class="tab-content">
      <!-- MANUEL GİRİŞ -->
      <div class="tab-pane fade show active" id="manuel-tab">
        <form id="baslikForm" class="row g-2 mb-3">
          <div class="col-md-4">
            <input class="form-control" name="il" placeholder="İl" required />
          </div>
          <div class="col-md-4">
            <input class="form-control" name="ilce" placeholder="İlçe" required />
          </div>
          <div class="col-md-4">
            <input class="form-control" name="mahalle" placeholder="Mahalle" />
          </div>
        </form>

        <p class="text-muted small">
          Not: Bu ekran iskelet amaçlıdır — kategori/grup seçim listeleri ve
          işletmeci ekleme akışı bir sonraki adımda tamamlanacaktır.
        </p>

        <div id="sonucAlani"></div>
      </div>

      <!-- TÜRKVET DOSYASI -->
      <div class="tab-pane fade" id="turkvet-tab">
        <form id="turkvetForm" class="mb-3">
          <div class="mb-2">
            <input type="file" class="form-control" name="dosyalar" multiple />
          </div>
          <button type="submit" class="btn btn-primary">Önizleme Oluştur</button>
        </form>
        <div id="turkvetSonucAlani"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Türkvet dosyası önizleme akışı
    document.getElementById('turkvetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData(form);

      // Başlık bilgisini manuel sekmesindeki alanlardan alıyoruz (basitleştirme)
      const baslikForm = document.getElementById('baslikForm');
      formData.append('il', baslikForm.il.value);
      formData.append('ilce', baslikForm.ilce.value);
      formData.append('mahalle', baslikForm.mahalle.value);

      const alan = document.getElementById('turkvetSonucAlani');
      alan.innerHTML = '<div class="text-muted">Hesaplanıyor...</div>';

      try {
        const res = await fetch('/api/bbhb/turkvet/onizleme', {
          method: 'POST',
          body: formData,
        });
        const json = await res.json();

        if (!json.success) {
          alan.innerHTML = `<div class="alert alert-danger">${json.message}</div>`;
          return;
        }

        alan.innerHTML = `
          <div class="alert alert-success">
            Genel Toplam BBHB: <strong>${json.data.genelToplamBBHB}</strong>
          </div>
          <pre class="bg-white p-3 border">${JSON.stringify(json.data, null, 2)}</pre>
          <button id="kaydetBtn" class="btn btn-success">Kaydet</button>
        `;

        document.getElementById('kaydetBtn').addEventListener('click', async () => {
          const kaydetRes = await fetch('/api/bbhb/kaydet', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(json.data),
          });
          const kaydetJson = await kaydetRes.json();
          alert(kaydetJson.message || 'Kaydedildi');
        });
      } catch (err) {
        alan.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
